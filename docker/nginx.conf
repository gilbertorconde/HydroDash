# Optional reference config: reverse-proxy HydroDash (Vite preview listens on 4173 in the container).
# Not used by docker-compose.yml—copy into your own nginx/Caddy/Traefik setup. See docs/environment.md § Reverse proxy.

# If nginx runs on the Docker host: use `127.0.0.1:8080` (or your compose `ports` mapping).
# If nginx is another container on the same Compose network: use `hydrodash:4173`.
upstream hydrodash {
    server hydrodash:4173;
    keepalive 8;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 10m;

    location / {
        proxy_pass http://hydrodash;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
