# HydroDash stack: ghcr.io/gilbertorconde/hydrodash:latest + MariaDB. See docs/environment.md.

name: hydrodash

services:
  mariadb:
    image: mariadb:11
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}
      MARIADB_DATABASE: ${MARIADB_DATABASE}
      MARIADB_USER: ${MARIADB_USER}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD}
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ['CMD', 'healthcheck.sh', '--connect', '--innodb_initialized']
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 25s
    restart: unless-stopped

  hydrodash:
    image: ghcr.io/gilbertorconde/hydrodash:latest
    environment:
      NODE_ENV: production
      DATABASE_URL: mysql://${MARIADB_USER}:${MARIADB_PASSWORD}@mariadb:3306/${MARIADB_DATABASE}
      DATABASE_SCHEMA_URL: mysql://root:${MARIADB_ROOT_PASSWORD}@mariadb:3306/${MARIADB_DATABASE}
      OS_BASE_URL: ${OS_BASE_URL}
      OS_PORT: ${OS_PORT}
      OS_PASSWORD: ${OS_PASSWORD}
      OS_PW_HASH: ${OS_PW_HASH}
      HYDRODASH_LOGIN_PASSWORD: ${HYDRODASH_LOGIN_PASSWORD}
      HYDRODASH_SESSION_SECRET: ${HYDRODASH_SESSION_SECRET}
      PREVIEW_ALLOWED_HOSTS: ${PREVIEW_ALLOWED_HOSTS}
      # Required on this service for “Send test notification” and for pushEnabled in the UI; worker uses its own copy below.
      NTFY_SERVER_URL: ${NTFY_SERVER_URL}
      NTFY_ACCESS_TOKEN: ${NTFY_ACCESS_TOKEN}
    ports:
      - '8080:4173'
    depends_on:
      mariadb:
        condition: service_healthy
    restart: unless-stopped

  hydrodash-notify:
    image: ghcr.io/gilbertorconde/hydrodash:latest
    command: ['node', 'dist/notifications-service.mjs']
    environment:
      NODE_ENV: production
      DATABASE_URL: mysql://${MARIADB_USER}:${MARIADB_PASSWORD}@mariadb:3306/${MARIADB_DATABASE}
      DATABASE_SCHEMA_URL: mysql://root:${MARIADB_ROOT_PASSWORD}@mariadb:3306/${MARIADB_DATABASE}
      OS_BASE_URL: ${OS_BASE_URL}
      OS_PORT: ${OS_PORT}
      OS_PASSWORD: ${OS_PASSWORD}
      OS_PW_HASH: ${OS_PW_HASH}
      HYDRODASH_SESSION_SECRET: ${HYDRODASH_SESSION_SECRET}
      NTFY_SERVER_URL: ${NTFY_SERVER_URL}
      NTFY_ACCESS_TOKEN: ${NTFY_ACCESS_TOKEN}
    depends_on:
      mariadb:
        condition: service_healthy
    restart: unless-stopped

volumes:
  mariadb_data:
